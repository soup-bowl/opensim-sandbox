
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
	<head>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3/dist/css/bootstrap.min.css" rel="stylesheet">
		<title>OpenSimulator Sandbox</title>
	</head>
	<body>
		<main role="main" class="container-sm mt-5 text-center">
			<h1>OpenSimulator Sandbox Instance</h1>
			<p>
				<span class="badge bg-primary">Standalone</span>
				<span class="badge bg-secondary">MySQL</span>
				<span class="badge bg-secondary">Isolated</span>
			</p>		  
			<h2>Credentials</h2>
			<div class="table-responsive" style="margin-left: 25%; margin-right: 25%;">
				<table class="table table-sm">
					<thead>
						<tr>
							<th>Username</th>
							<th>Password</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td>Governor Linden</td>
							<td><code>password</code></td>
						</tr>
					</tbody>
				</table>
			</div>
			<h2>Services</h2>
			<div class="table-responsive" style="margin-left: 20%; margin-right: 20%;">
				<table class="table table-striped table-sm">
					<thead>
						<tr>
							<th>Service</th>
							<th>Port</th>
							<th>Usage</th>
						</tr>
					</thead>
					<tbody class="text-start">
						<tr>
							<td>Firestorm Viewer</td>
							<td><a href="http://localhost:3001/" target="_blank">3001</a></td>
							<td>The port used by Firestorm Viewer VNC, accept the self-signed certificate.</td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
		<footer class="footer text-center">
			<div class="container">
				<span class="text-muted">
					<a href="https://github.com/soup-bowl/opensim-sandbox" class="text-muted">Project GitHub</a>&nbsp;
					<a href="http://opensimulator.org/wiki/Main_Page" class="text-muted">OpenSimuator</a>
				</span>
			</div>
		</footer>
	</body>
</html>
